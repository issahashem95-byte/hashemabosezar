<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المطورون 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: radial-gradient(ellipse at center, #0f0f1f 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
            perspective: 1200px;
            overflow-x: hidden;
        }

        /* جزيئات خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, #ffffff15, transparent),
                radial-gradient(2px 2px at 40% 70%, #ffffff10, transparent),
                radial-gradient(2px 2px at 60% 20%, #ffffff15, transparent),
                radial-gradient(2px 2px at 80% 80%, #ffffff10, transparent),
                radial-gradient(2px 2px at 10% 90%, #ffffff08, transparent),
                radial-gradient(2px 2px at 90% 10%, #ffffff08, transparent);
            background-size: 200px 200px;
            animation: stars 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes stars {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        /* الحاوية الرئيسية - 3D */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 55px 45px;
            max-width: 750px;
            width: 100%;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 0 60px rgba(100, 140, 255, 0.05);
            text-align: center;
            transform: rotateX(5deg) rotateY(-2deg) translateZ(30px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            animation: float3D 6s ease-in-out infinite;
        }

        @keyframes float3D {
            0%, 100% { transform: rotateX(5deg) rotateY(-2deg) translateZ(30px) translateY(0); }
            50% { transform: rotateX(3deg) rotateY(2deg) translateZ(50px) translateY(-15px); }
        }

        .card:hover {
            transform: rotateX(0deg) rotateY(0deg) translateZ(60px) scale(1.02);
            box-shadow: 
                0 60px 120px rgba(0, 0, 0, 0.9),
                0 0 0 2px rgba(160, 180, 255, 0.15) inset,
                0 0 80px rgba(100, 140, 255, 0.1);
        }

        /* عنوان رئيسي بتأثير 3D */
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #a0b4ff 0%, #6c8cff 50%, #4a6cf7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            letter-spacing: 3px;
            font-weight: 700;
            text-shadow: 0 0 40px rgba(100, 140, 255, 0.2);
            transform: translateZ(40px);
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #6c8cff, transparent);
            border-radius: 2px;
            animation: glowLine 3s ease-in-out infinite;
        }

        @keyframes glowLine {
            0%, 100% { width: 80px; opacity: 0.5; }
            50% { width: 150px; opacity: 1; }
        }

        /* بطاقات المطورين - 3D */
        .dev-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 35px;
            padding: 22px 28px;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translateZ(20px);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .dev-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(160, 180, 255, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .dev-item:hover {
            transform: translateZ(60px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(160, 180, 255, 0.2);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(100, 140, 255, 0.05);
        }

        .dev-item:hover::before {
            opacity: 1;
        }

        .dev-name {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        .dev-name .icon-3d {
            font-size: 32px;
            display: inline-block;
            animation: icon3D 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(160, 180, 255, 0.2));
        }

        .dev-item:nth-child(1) .icon-3d {
            animation-delay: 0s;
        }
        .dev-item:nth-child(2) .icon-3d {
            animation-delay: 0.5s;
        }

        @keyframes icon3D {
            0%, 100% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }

        .badge-3d {
            font-size: 13px;
            font-weight: 600;
            background: linear-gradient(135deg, rgba(160, 180, 255, 0.2), rgba(100, 140, 255, 0.1));
            color: #a0b4ff;
            padding: 4px 18px;
            border-radius: 40px;
            border: 1px solid rgba(160, 180, 255, 0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(100, 140, 255, 0.05);
            letter-spacing: 0.5px;
        }

        .dev-sub {
            font-size: 15px;
            color: #8892b0;
            margin-top: 8px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* زر الإنستغرام 3D */
        .instagram-btn-3d {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 50px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            background-size: 300% 300%;
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 
                0 10px 40px rgba(225, 48, 108, 0.4),
                0 0 60px rgba(225, 48, 108, 0.1);
            border: none;
            cursor: pointer;
            letter-spacing: 1.5px;
            transform: translateZ(30px);
            animation: gradientMove 4s ease-in-out infinite, floatBtn 3s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes floatBtn {
            0%, 100% { transform: translateZ(30px) translateY(0); }
            50% { transform: translateZ(50px) translateY(-5px); }
        }

        .instagram-btn-3d::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-radius: 60px;
            filter: blur(20px);
            opacity: 0.3;
            transition: opacity 0.5s;
            z-index: -1;
        }

        .instagram-btn-3d:hover {
            transform: translateZ(60px) scale(1.08) translateY(-5px);
            box-shadow: 
                0 20px 60px rgba(225, 48, 108, 0.6),
                0 0 80px rgba(225, 48, 108, 0.2);
        }

        .instagram-btn-3d:active {
            transform: translateZ(20px) scale(0.95);
        }

        .instagram-btn-3d .icon {
            margin-left: 12px;
            font-size: 24px;
        }

        /* تذييل 3D */
        .footer-note-3d {
            margin-top: 35px;
            font-size: 14px;
            color: #3a4060;
            padding-top: 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 2px;
            transform: translateZ(10px);
            font-weight: 300;
        }

        /* خطوط زخرفية 3D */
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(160, 180, 255, 0.1), transparent 50%, rgba(160, 180, 255, 0.1));
            border-radius: 62px;
            z-index: -1;
            filter: blur(30px);
            opacity: 0.5;
            animation: borderGlow 4s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }

        /* استجابة للشاشات الصغيرة */
        @media(max-width: 580px) {
            .card {
                padding: 30px 20px;
                border-radius: 40px;
                transform: rotateX(2deg) rotateY(0deg) translateZ(15px);
            }
            .card:hover {
                transform: rotateX(0deg) rotateY(0deg) translateZ(30px) scale(1.01);
            }
            .dev-name {
                font-size: 20px;
                gap: 10px;
            }
            h1 {
                font-size: 24px;
            }
            .instagram-btn-3d {
                padding: 14px 35px;
                font-size: 16px;
                width: 100%;
            }
            .dev-item {
                padding: 18px 20px;
                border-radius: 28px;
            }
            .dev-name .icon-3d {
                font-size: 26px;
            }
            @keyframes float3D {
                0%, 100% { transform: rotateX(2deg) rotateY(0deg) translateZ(15px) translateY(0); }
                50% { transform: rotateX(1deg) rotateY(1deg) translateZ(30px) translateY(-8px); }
            }
        }

        @media(max-width: 400px) {
            .card {
                padding: 20px 15px;
                border-radius: 30px;
            }
            .dev-name {
                font-size: 17px;
            }
            .instagram-btn-3d {
                font-size: 14px;
                padding: 12px 20px;
            }
            .badge-3d {
                font-size: 11px;
                padding: 2px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✦ المطورون ✦</h1>
        
        <div class="dev-item">
            <div class="dev-name">
                <span class="icon-3d">⚡</span>
                المطور ابو سيزار المنبجي
                <span class="badge-3d">مؤسس</span>
            </div>
            <div class="dev-sub">✦ تطوير الواجهات و الأنظمة ✦</div>
        </div>
        
        <div class="dev-item">
            <div class="dev-name">
                <span class="icon-3d">🔥</span>
                المطور هاشم العيسى
                <span class="badge-3d">شريك</span>
            </div>
            <div class="dev-sub">✦ تطوير الخوارزميات و البنية التحتية ✦</div>
        </div>

        <!-- زر الإنستغرام 3D -->
        <a href="https://www.instagram.com/ge_tar208" target="_blank" class="instagram-btn-3d">
            <span class="icon">📸</span> تابعنا على إنستغرام
        </a>

        <div class="footer-note-3d">◈ 2026 ◈</div>
    </div>
</body>
  </html>
