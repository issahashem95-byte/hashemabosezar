<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المطورون</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Tahoma',sans-serif;background:linear-gradient(145deg,#0b0e1a,#1a1f2f);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;direction:rtl}
        .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:48px;padding:50px 40px;max-width:700px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,0.7);text-align:center}
        h1{font-size:28px;color:#a0b4ff;margin-bottom:30px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:18px}
        .dev-item{background:rgba(255,255,255,0.03);border-radius:28px;padding:18px 24px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.05);transition:0.3s}
        .dev-item:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px)}
        .dev-name{font-size:26px;font-weight:600;color:#ffffff;display:flex;align-items:center;justify-content:center;gap:12px}
        .badge{font-size:14px;background:rgba(160,180,255,0.15);color:#a0b4ff;padding:2px 14px;border-radius:40px}
        .dev-sub{font-size:14px;color:#8892b0;margin-top:6px}
        .footer-note{margin-top:30px;font-size:13px;color:#4a5070;padding-top:20px}
        @media(max-width:480px){.card{padding:30px 20px}.dev-name{font-size:20px}}
    </style>
</head>
<body>
    <div class="card">
        <h1>✧ قائمة المطورين ✧</h1>
        <div class="dev-item">
            <div class="dev-name">⚡ المطور ابو سيزار المنبجي <span class="badge">مؤسس</span></div>
            <div class="dev-sub">✦ تطوير الواجهات و الأنظمة ✦</div>
        </div>
        <div class="dev-item">
            <div class="dev-name">🔥 المطور هاشم العيسى <span class="badge">شريك</span></div>
            <div class="dev-sub">✦ تطوير الخوارزميات و البنية التحتية ✦</div>
        </div>
        <div class="footer-note">◈ 2026 ◈</div>
    </div>
</body>
</html>
